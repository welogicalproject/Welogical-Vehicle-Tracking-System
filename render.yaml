services:
  # Backend Web Service
  - type: web
    name: vts-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    
    # Pre-deployment Database Migrations Command:
    # Render automatically runs Alembic migrations before booting the updated application.
    preDeployCommand: alembic upgrade head
    
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "https://your-frontend-app.vercel.app"  # Replace with actual Vercel domain post-deployment

      # Database — must be provided in the Render dashboard
      - key: DATABASE_URL
        sync: false
      - key: ASYNC_DATABASE_URL
        sync: false  # Optional: auto-derived from DATABASE_URL if omitted

      # Google Routes integration (disabled by default)
      - key: GOOGLE_ROUTES_ENABLED
        value: "false"
      - key: GOOGLE_ROUTES_API_KEY
        sync: false  # Optional Google Routes API key

      # Cloud Simulator — autonomous in-process vehicle simulation
      # Set SIMULATOR_ENABLED=true to activate on Render without any external process.
      - key: SIMULATOR_ENABLED
        value: "true"
      - key: SIMULATOR_DEVICE_UIDS
        value: "ESP32-DEMO-001,ESP32-DEMO-002,ESP32-DEMO-003"
      - key: SIMULATOR_SEND_INTERVAL
        value: "10.0"
      - key: SIMULATOR_SPEED_MULTIPLIER
        value: "1.0"
      - key: SIMULATOR_LOOP_ROUTE
        value: "true"
      - key: SIMULATOR_AUTO_REGISTER
        value: "true"
      - key: SIMULATOR_HEALTH_CHECK_INTERVAL
        value: "30"
